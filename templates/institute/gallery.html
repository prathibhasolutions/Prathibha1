{% extends 'base.html' %}

{% block title %}Institute Gallery{% endblock %}

{% block content %}
<section class="section-intro" id="gallery">
    <h2>Institute Gallery</h2>
    <p>Explore snapshots from Prathibha Institute activities, classrooms, and events.</p>
</section>

<section class="institute-gallery">
    <div class="institute-catalog-head">
        <h3>Gallery</h3>
    </div>
    <div class="institute-gallery-grid">
        <img src="https://www.prathibhainstitutions.com/images/photo1.jpg" alt="Prathibha Institute gallery photo 1" class="institute-gallery-image">
        <img src="https://www.prathibhainstitutions.com/images/photo2.jpg" alt="Prathibha Institute gallery photo 2" class="institute-gallery-image">
        <img src="https://www.prathibhainstitutions.com/images/photo3.jpg" alt="Prathibha Institute gallery photo 3" class="institute-gallery-image">
        <img src="https://www.prathibhainstitutions.com/images/photo4.jpg" alt="Prathibha Institute gallery photo 4" class="institute-gallery-image">
        <img src="https://www.prathibhainstitutions.com/images/photo6.png" alt="Prathibha Institute gallery photo 5" class="institute-gallery-image">
    </div>
</section>
{% endblock %}
