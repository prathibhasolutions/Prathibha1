{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<section class="auth-panel">
    <h2>Login</h2>
    <p>Login with your username and password to continue booking services.</p>

    <form method="post" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="auth-submit">Login</button>
    </form>
    <p><a class="auth-btn auth-btn-google auth-btn-full" href="{% url 'accounts:google_login' %}">Continue with Google</a></p>
    <p>New user? <a href="{% url 'accounts:register' %}">Register</a></p>
</section>
{% endblock %}
